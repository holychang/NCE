<body>
<div id="app">
  <header class="app-header">
    <div class="header-content">
      <h1>新概念英语</h1>
      <p class="subtitle">New Concept English</p>
    </div>
    <!-- 课本选择器已移至下方播放器区域 -->
    <div class="header-actions">
      <span class="status-pill"><a href="https://ichochy.com" target="_blank">Blog</a></span>
      <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path
          d="M17.5 11.18C16.82 11.39 16.11 11.5 15.37 11.5C11.47 11.5 8.31 8.34 8.31 4.44C8.31 3.7 8.42 2.99 8.63 2.31C5.46 3.07 3 5.92 3 9.37C3 13.27 6.16 16.43 10.06 16.43C13.51 16.43 16.36 13.97 17.12 10.8"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      </button>
    </div>
  </header>

  <div class="container">
    <!-- 左侧：Unit列表（桌面端） -->
    <aside class="unit-list desktop-only">
      <h2>课程列表</h2>
      <div id="unitListContainer"></div>
    </aside>

    <!-- 右侧：课本选择 + 播放器和歌词 -->
    <div class="player-column">
      <main class="player-section">
        <div class="book-info">
          <img id="bookCover" src="" alt="课本封面" class="book-cover" />
          <div class="unit-info">
            <div class="unit-title-group">
              <label>
                <select class="book-select" id="bookSelect">
                  <option value="">选择课本</option>
                </select>
              </label>
              <label>
                <select id="unitSelect" class="unit-select">
                  <option value="">选择 Unit</option>
                </select>
              </label>
            </div>
          </div>
        </div>

      <!-- 上一课/下一课导航按钮 -->
      <section class="control-panel" aria-label="课程与播放控制区">
        <div class="navigation-buttons">
        <button id="prevUnitBtn" class="nav-btn prev-btn" title="上一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M12 16L7 11L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
          </svg>
        </button>
            <button id="playPauseBtn" class="play-btn" aria-label="播放或暂停" disabled>
            <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
            </svg>
          </button>

        <button id="nextUnitBtn" class="nav-btn next-btn" title="下一课">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M8 4L13 9L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
          </svg>
        </button>
        <button id="speedBtn" class="speed-btn" title="播放速度">
          <span id="speedText">1.0x</span>
        </button>
          <div class="mode-selector loop-mode-selector" role="group" aria-label="播放模式">
            <button class="mode-option-btn loop-mode-btn" type="button" data-loop-mode="off" aria-label="关闭循环" aria-pressed="false" title="关闭循环">关</button>
            <button class="mode-option-btn loop-mode-btn" type="button" data-loop-mode="click" aria-label="点句点读" aria-pressed="false" title="点句点读">点</button>
            <button class="mode-option-btn loop-mode-btn" type="button" data-loop-mode="sentence" aria-label="单句循环" aria-pressed="false" title="单句循环">单</button>
            <button class="mode-option-btn loop-mode-btn" type="button" data-loop-mode="list" aria-label="列表循环" aria-pressed="false" title="列表循环">循</button>
          </div>
          <div class="mode-selector translation-mode-selector" role="group" aria-label="歌词显示模式">
            <button class="mode-option-btn translation-mode-btn" type="button" data-translation-mode="blur" aria-label="模糊双语" aria-pressed="false" title="模糊双语">糊</button>
            <button class="mode-option-btn translation-mode-btn" type="button" data-translation-mode="hide" aria-label="仅显示英文" aria-pressed="false" title="仅显示英文">英</button>
            <button class="mode-option-btn translation-mode-btn" type="button" data-translation-mode="show" aria-label="显示双语" aria-pressed="false" title="显示双语">双</button>
            <button class="mode-option-btn translation-mode-btn" type="button" data-translation-mode="onlyChinese" aria-label="仅显示中文" aria-pressed="false" title="仅显示中文">中</button>
          </div>
        </div>
        <!-- 音频播放器 -->
        <div class="audio-player">
          <audio id="audioPlayer"></audio>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-handle" id="progressHandle"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 歌词显示区域 -->
      <section class="lyrics-container" aria-label="双语歌词区">
        <div id="lyricsDisplay" class="lyrics-display">
          <p class="placeholder">选择一个Unit开始学习...</p>
        </div>
         <!-- 支持功能
        <div class="like-and-support">
            <p>--nce.ichochy.com--</p>
            <p>❤️❤️❤️</p>
            <button id="supportBtn" class="support-btn" type="button">打赏支持</button>
        </div>
         -->
      </section>
      </main>
    </div>
